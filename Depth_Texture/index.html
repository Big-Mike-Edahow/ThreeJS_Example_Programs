<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="importmap">
        {"imports":{"three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
                    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"}}
    </script>
    <script id="post-vert" type="x-shader/x-vertex">
			varying vec2 vUv;

			void main() {
				vUv = uv;
				gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
			}
	</script>
    <script id="post-frag" type="x-shader/x-fragment">
			varying vec2 vUv;
			uniform sampler2D tDiffuse;
			uniform sampler2D tDepth;
			uniform float cameraNear;
			uniform float cameraFar;


			float readDepth( sampler2D depthSampler, vec2 coord ) {
				float fragCoordZ = texture2D( depthSampler, coord ).x;
				float viewZ = ( cameraNear * cameraFar ) / ( ( cameraFar - cameraNear ) * fragCoordZ - cameraFar );
				return ( viewZ + cameraNear ) / ( cameraNear - cameraFar );
			}

			void main() {
				//vec3 diffuse = texture2D( tDiffuse, vUv ).rgb;
				float depth = readDepth( tDepth, vUv );

				gl_FragColor.rgb = 1.0 - vec3( depth );
				gl_FragColor.a = 1.0;
			}
		</script>
    <link href="./static/css/style.css" type="text/css" rel="stylesheet">
    <link href="./favicon.ico" type="image/png" rel="icon">
    <title>ThreeJS - Depth Texture</title>
</head>

<body>
    <main>
        <section id="threejs-container"></section>
    </main>
    <script src="./static/js/main.js" type="module"></script>
</body>

</html>
